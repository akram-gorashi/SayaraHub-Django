services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sayarahub}
      POSTGRES_USER: ${POSTGRES_USER:-sayarahub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sayarahub}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sayarahub}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-sayarahub}
      POSTGRES_USER: ${POSTGRES_USER:-sayarahub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sayarahub}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-development-only-secret-key-change-before-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build: .
    command: celery -A config worker --loglevel=info
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-sayarahub}
      POSTGRES_USER: ${POSTGRES_USER:-sayarahub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sayarahub}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-development-only-secret-key-change-before-production}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --destination celery@$${HOSTNAME} --timeout 5"]
      interval: 30s
      timeout: 10s
      retries: 3

  beat:
    build: .
    command: celery -A config beat --loglevel=info
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-sayarahub}
      POSTGRES_USER: ${POSTGRES_USER:-sayarahub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sayarahub}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-development-only-secret-key-change-before-production}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
